
Delete user account
---
tags:
  - Authentication
security:
  - Bearer: []
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          example: password123
          description: Current password to confirm deletion
responses:
  200:
    description: Account deleted successfully
    schema:
      type: object
      properties:
        message:
          type: string
          example: Account deleted successfully
  400:
    description: Password required
  401:
    description: Incorrect password
  404:
    description: User not found