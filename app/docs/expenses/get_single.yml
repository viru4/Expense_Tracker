tags:
  - Expenses
summary: Get a single expense
description: Returns one expense by id for the authenticated user.
security:
  - Bearer: []
produces:
  - application/json
parameters:
  - name: id
    in: path
    type: integer
    required: true
    description: Expense id.
    example: 14
responses:
  200:
    description: Expense found.
    schema:
      $ref: '#/definitions/Expense'
  401:
    description: Missing, invalid, or expired JWT token.
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  404:
    description: Expense not found.
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
  500:
    description: Unexpected server error.
    schema:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
definitions:
  Expense:
    type: object
    properties:
      id:
        type: integer
        example: 14
      title:
        type: string
        example: Grocery shopping
      amount:
        type: number
        format: float
        example: 42.75
      category:
        type: string
        example: Food
      user_id:
        type: integer
        example: 1
      created_at:
        type: string
        example: 27 June 2026, 10:30 AM


